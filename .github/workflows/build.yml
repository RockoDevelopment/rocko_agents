name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (rocko.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" pydantic aiofiles apscheduler python-dotenv pyinstaller

      - name: Verify files exist
        run: |
          python --version
          dir
          dir bridge

      - name: Build exe
        run: python -m PyInstaller rocko.spec --clean -y

      - name: Check output
        run: |
          dir dist
          dist\rocko.exe --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocko-windows
          path: dist\rocko.exe
          retention-days: 30

  build-macos:
    name: macOS (rocko)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" pydantic aiofiles apscheduler python-dotenv pyinstaller

      - name: Build
        run: python -m PyInstaller rocko.spec --clean -y

      - name: Check output
        run: |
          ls -lh dist/
          dist/rocko --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocko-macos
          path: dist/rocko
          retention-days: 30